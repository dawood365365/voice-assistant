# ── LLM Configuration ─────────────────────────────────────────────────────────
# llm:
#   provider: groq
#   model: llama-3.3-70b-versatile

llm:
  provider: cerebras
  model: gpt-oss-120b

# ── STT Configuration ─────────────────────────────────────────────────────────
stt:
  provider: deepgram
  model: nova-3
  language: en # multi for urdu


# ── TTS Configuration ────────────────────────────────────────────────────────

# tts:
#   provider: elevenlabs
#   model: eleven_flash_v2_5
#   voice_id: SAz9YHcvj6GT2YYXdXww

tts:
  provider: deepgram
  model: aura-asteria-en

# ── Agent Configuration ───────────────────────────────────────────────────────

agent:
  active_language: english   # ← just flip this one value: "english" or "roman_urdu"

  greetings:
    english: "Hello! I am your voice assistant. How can I help you today?"
    roman_urdu: "Mein apka voice assistant hon, mein apki kia madad krsakta hon?"

  instructions:
    english: >
      You are a helpful voice assistant. Always reply in clear, natural English.
      Keep responses short and conversational since this is a voice chat.
      If a question is related to the course slides, use search_knowledge_base.
      If search_knowledge_base returns NOT_RELEVANT, immediately call general_knowledge
      and answer directly — never say you don't know or suggest searching the internet.
      If the user asks to send an email, use the send_email tool. Write a professional,
      well-composed email body based on their request rather than repeating their words verbatim.

    roman_urdu: >
      Tum ek madadgar voice assistant ho. Hamesha Roman Urdu mein jawab dou.
      Jawab chota rakho — yeh voice chat hai.
      Sawal course slides se related ho to search_knowledge_base use karo.
      Agar woh NOT_RELEVANT bole, to turant general_knowledge tool call karo aur
      seedha jawab do. Kabhi mat kaho ke tumhe nahi pata.
      Kabhi English mein jawab mat do, hamesha Roman Urdu use karo.
      Agar user email bhejne ko kahe, send_email tool use karo. Professional content
      khud generate karo based on user ki request.